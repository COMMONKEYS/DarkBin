{% extends "navbar.html" %}

{% block top %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password | Rarbin</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/legacy/index.css">
    <link rel="stylesheet" href="/static/files/doxbin.css">
    <link rel="canonical" href="https://rarbin.com/reset-password"/>
    <style>
        body {
            background-color: #060606;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .reset-container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            text-align: center;
        }
        .reset-container h2 {
            margin-bottom: 20px;
            color: #eee;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        .form-control {
            width: calc(100% - 20px);
            padding: 10px;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 3px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background-color: #337ab7;
            color: white;
            font-size: 16px;
        }
        .alert {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 3px;
        }
        .alert-error {
            color: #d9534f;
            background-color: rgba(217, 83, 79, 0.1);
            border: 1px solid #d9534f;
        }
        .alert-success {
            color: #5cb85c;
            background-color: rgba(92, 184, 92, 0.1);
            border: 1px solid #5cb85c;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>Reset Password</h2>
        
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        {% if success %}
            <div class="alert alert-success">{{ success }}</div>
            <p>You can now <a href="{{ url_for('login') }}" style="color: #337ab7;">log in</a> with your new password.</p>
        {% else %}
            <p style="color: #aaa; margin-bottom: 20px;">Enter your new password below.</p>
            
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="password">New Password:</label>
                                            <input type="password" id="password" name="password" class="form-control" required minlength="6" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password:</label>
                                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="6" autocomplete="off">
                </div>
                <div class="form-group" style="justify-content: center;">
                    <div class="g-recaptcha" data-theme="dark" data-sitekey="6LfkGncrAAAAACAFCgbfJzEZQt8XIr69KTXWSIVp"></div>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
        {% endif %}
    </div>
</body>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</html>
{% endblock %}
